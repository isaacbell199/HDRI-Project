name: Build NexaStory CUDA (NVIDIA GPU)

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-cuda:
    name: Build Windows x64 CUDA
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        run: |
          powershell -c "irm bun.sh/install.ps1 | iex"
          echo "$env:USERPROFILE\.bun\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: llama-cuda

      - name: Install CUDA Toolkit
        run: |
          choco install cuda -y
          echo "CUDA_PATH=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        # Note: CUDA build requires the CUDA Toolkit to be installed on the runner.
        # The GitHub Actions windows-latest runner may not have CUDA pre-installed.
        # You may need a self-hosted runner with CUDA for this to work.

      - name: Install frontend dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Build Tauri application (CUDA)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: bun run tauri
          args: >
            --target x86_64-pc-windows-msvc
            --bundles nsis,msi
            -- --features llama-cuda

      - name: Upload CUDA NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: NexaStory-CUDA-NSIS
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Upload CUDA MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: NexaStory-CUDA-MSI
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
